<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loading portfolio…</title>
<meta name="description" content="ImpactGrid creator portfolio"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
.ig-loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080810;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;gap:16px}
.ig-loading-spinner{width:36px;height:36px;border-radius:50%;border:2.5px solid rgba(255,255,255,.1);border-top-color:#c97e08;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ig-loading-text{font-size:13px;letter-spacing:.05em}
.ig-error{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080810;color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;gap:12px;text-align:center;padding:40px 20px}
.ig-error-code{font-size:80px;font-weight:800;font-family:'Syne',sans-serif;background:linear-gradient(135deg,#c97e08,#f0b429);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.ig-error h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;margin:0}
.ig-error p{font-size:14px;color:rgba(255,255,255,.45);max-width:360px;line-height:1.7}
.ig-error a{margin-top:8px;padding:11px 24px;background:#c97e08;color:#fff;border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;text-decoration:none;transition:.15s}
.ig-error a:hover{opacity:.85}
</style>
</head>
<body>
<div class="ig-loading" id="igLoading">
  <div class="ig-loading-spinner"></div>
  <div class="ig-loading-text">Loading portfolio…</div>
</div>
<script>
var IG_CONTENT_URL  = 'https://exeiojgldxqaakkybdij.supabase.co';
var IG_CONTENT_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4ZWlvamdsZHhxYWFra3liZGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDc4NTcsImV4cCI6MjA4ODkyMzg1N30.aRXgeHqaOxkidwpWVGEOKBQAeo9_C5Fk3Gu5ZlbmxTQ';

function getSlug() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('slug')) return params.get('slug');
  var parts = window.location.pathname.split('/').filter(Boolean);
  var last  = parts[parts.length - 1];
  if (last && last !== 'p.html' && last !== 'p') return last;
  return null;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(code, title, message) {
  document.getElementById('igLoading').outerHTML =
    '<div class="ig-error"><div class="ig-error-code">' + code + '</div>' +
    '<h1>' + title + '</h1><p>' + message + '</p>' +
    '<a href="https://impactgridgroup.com">Go to ImpactGrid →</a></div>';
}

async function loadPortfolio() {
  var slug = getSlug();
  if (!slug) { showError('404','Portfolio not found','No portfolio slug was provided.'); return; }
  try {
    var res = await fetch(
      IG_CONTENT_URL + '/rest/v1/portfolios?slug=eq.' + encodeURIComponent(slug) +
      '&published=eq.true&select=*&limit=1',
      { headers: { 'apikey': IG_CONTENT_ANON, 'Authorization': 'Bearer ' + IG_CONTENT_ANON } }
    );
    if (!res.ok) throw new Error('Supabase error: ' + res.status);
    var rows = await res.json();
    if (!rows || !rows.length) { showError('404','Portfolio not found','This portfolio may have been deleted or is not published yet.'); return; }
    renderPortfolio(rows[0]);
  } catch (err) {
    console.error('[ImpactGrid]', err.message);
    showError('500','Something went wrong','We couldn\'t load this portfolio right now. Please try again in a moment.');
  }
}

function renderPortfolio(pf) {
  var THEMES = {
    dark:     { bg:'#080810', surface:'#10101e', text:'#e2e8f0', sub:'rgba(226,232,240,0.5)', border:'rgba(255,255,255,0.06)', accent:'#c97e08' },
    navy:     { bg:'#05091a', surface:'#0c1230', text:'#e8eaf6', sub:'rgba(232,234,246,0.5)', border:'rgba(255,255,255,0.07)', accent:'#2d6edb' },
    clean:    { bg:'#f8fafc', surface:'#ffffff', text:'#0d1017', sub:'#4a5068',               border:'rgba(0,0,0,0.07)',        accent:'#2d6edb' },
    midnight: { bg:'#080810', surface:'#10101e', text:'#e2e8f0', sub:'rgba(226,232,240,0.5)', border:'rgba(255,255,255,0.06)', accent:'#818cf8' },
    rose:     { bg:'#1a0d12', surface:'#260d16', text:'#fce7ef', sub:'rgba(252,231,239,0.55)',border:'rgba(255,255,255,0.07)', accent:'#f43f80' },
    forest:   { bg:'#14532d', surface:'#1a6635', text:'#f0fdf4', sub:'rgba(240,253,244,0.6)', border:'rgba(255,255,255,0.08)', accent:'#4ade80' },
  };

  var t      = THEMES[pf.theme] || THEMES.dark;
  var accent = pf.accent_color || t.accent;

  var heroImgs = ((pf.hero_media || []).map(function(m){ return m.url; })).filter(Boolean);
  var heroImg0 = heroImgs[0] || '';
  var initials = (pf.name || 'CR').split(' ').map(function(w){ return w[0]||''; }).join('').toUpperCase().slice(0,2);

  document.title = esc(pf.name) + ' — ' + esc(pf.niche) + ' | ImpactGrid';
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.content = pf.ai_meta || (pf.niche + ' creator portfolio');

  var socials = [
    pf.youtube_url   ? { icon:'▶', label:'YouTube',   url:pf.youtube_url,   color:'#ff0000', subs: pf.youtube_subs } : null,
    pf.tiktok_url    ? { icon:'♪', label:'TikTok',    url:pf.tiktok_url,    color:'#69c9d0', subs: pf.tiktok_followers } : null,
    pf.instagram_url ? { icon:'◉', label:'Instagram', url:pf.instagram_url, color:'#e1306c' } : null,
    pf.linkedin_url  ? { icon:'in',label:'LinkedIn',  url:pf.linkedin_url,  color:'#0077b5' } : null,
    pf.twitter_url   ? { icon:'𝕏', label:'Twitter/X', url:pf.twitter_url,   color:'#1d9bf0' } : null,
  ].filter(Boolean);

  var servicesHTML = (pf.services || []).map(function(s){
    return '<div class="card service-card">' +
      '<div class="service-icon">' + esc(s.icon||'✦') + '</div>' +
      '<div class="service-title">' + esc(s.title) + '</div>' +
      '<div class="service-desc">'  + esc(s.description) + '</div>' +
      (s.price ? '<div class="service-price">' + esc(s.price) + '</div>' : '') +
    '</div>';
  }).join('');

  var projectsHTML = (pf.projects || []).map(function(p){
    return '<div class="card">' +
      '<div class="project-title">' + esc(p.title) + '</div>' +
      '<div class="project-desc">'  + esc(p.description) + '</div>' +
      (p.url ? '<a href="' + esc(p.url) + '" target="_blank" class="project-link">View project →</a>' : '') +
    '</div>';
  }).join('');

  var testimonialsHTML = (pf.testimonials || []).map(function(t2){
    return '<div class="card">' +
      '<div class="testimonial-quote">"' + esc(t2.quote) + '"</div>' +
      '<div class="testimonial-author">— ' + esc(t2.author) + '</div>' +
    '</div>';
  }).join('');

  var socialHTML = socials.map(function(s){
    return '<a href="' + esc(s.url) + '" target="_blank" class="social-link" style="--lc:' + s.color + '">' +
      '<span class="si">' + s.icon + '</span>' +
      '<div class="sl-info"><span class="sl-label">' + esc(s.label) + '</span>' +
      (s.subs ? '<span class="sl-sub">' + esc(s.subs) + ' followers</span>' : '') + '</div>' +
      '<span class="sa">→</span>' +
    '</a>';
  }).join('');

  var statsHTML = (pf.total_followers || pf.engagement_rate || pf.monthly_views) ?
    '<div class="stats-row">' +
      (pf.total_followers ? '<div class="stat"><div class="sv">' + esc(pf.total_followers) + '</div><div class="sl2">FOLLOWERS</div></div>' : '') +
      (pf.engagement_rate ? '<div class="stat"><div class="sv">' + esc(pf.engagement_rate) + '</div><div class="sl2">ENGAGEMENT</div></div>' : '') +
      (pf.monthly_views   ? '<div class="stat"><div class="sv">' + esc(pf.monthly_views)   + '</div><div class="sl2">MONTHLY VIEWS</div></div>' : '') +
    '</div>' : '';

  // ── Gallery: photo-album book with flip pages, same images as slideshow ──
  // Always show gallery in nav; use heroImgs or fallback placeholders
  var galleryImgs = heroImgs.length > 0 ? heroImgs : [
    'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',
    'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&q=80',
    'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=800&q=80',
    'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80',
    'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=800&q=80',
    'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80',
    'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=800&q=80',
    'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=800&q=80'
  ];

  // Group images into "spreads" of 4 per page (2 left + 2 right like a photo album)
  // Each spread = one book page flip
  var spreads = [];
  for (var si = 0; si < galleryImgs.length; si += 4) {
    spreads.push(galleryImgs.slice(si, si + 4));
  }
  var totalSpreads = spreads.length;

  // Build the stacked pages — each page has a front spread and back spread
  // Page 0 front = spread 0, page 0 back = spread 1, page 1 front = spread 2, etc.
  var bookPagesHTML = spreads.map(function(spread, pi) {
    function spreadGrid(imgs, side) {
      var cells = [0,1,2,3].map(function(ci) {
        var url = imgs[ci];
        if (!url) return '<div class="ab-cell ab-cell-empty"></div>';
        return '<div class="ab-cell"><img src="' + esc(url) + '" alt="Photo ' + (ci+1) + '" loading="lazy"/></div>';
      }).join('');
      return '<div class="ab-spread ab-spread-' + side + '">' +
        '<div class="ab-grid">' + cells + '</div>' +
        '<div class="ab-spine ab-spine-' + side + '"></div>' +
        '<div class="ab-page-num">' + (pi+1) + ' / ' + totalSpreads + '</div>' +
      '</div>';
    }
    // Front: this spread; Back: next spread (if exists), else end page
    var frontHTML = spreadGrid(spread, 'front');
    var nextSpread = spreads[pi + 1];
    var backHTML = nextSpread
      ? spreadGrid(nextSpread, 'back')
      : '<div class="ab-spread ab-end"><div class="ab-end-icon">✦</div><div class="ab-end-text">End of Gallery</div></div>';

    return '<div class="ab-page" id="abPage' + pi + '" style="z-index:' + (totalSpreads * 2 - pi) + '">' +
      '<div class="ab-face ab-face-front">' + frontHTML + '</div>' +
      '<div class="ab-face ab-face-back">' + backHTML + '</div>' +
    '</div>';
  }).join('');

  var abDotsHTML = spreads.map(function(_, i) {
    return '<button class="ab-dot' + (i===0?' active':'') + '" onclick="abGoto(' + i + ')" aria-label="Spread ' + (i+1) + '"></button>';
  }).join('');

  var galleryPageHTML =
    '<section class="page" id="page-gallery">' +
      '<div class="pg-header">' +
        '<div class="sec-lbl">Gallery</div>' +
        '<div class="sec-ttl">My Work</div>' +
      '</div>' +
      '<div class="ab-stage">' +
        '<div class="ab-book-wrap">' +
          '<!-- Left hard cover -->' +
          '<div class="ab-cover ab-cover-left"></div>' +
          '<div class="ab-book" id="abBook">' +
            bookPagesHTML +
          '</div>' +
          '<!-- Right hard cover -->' +
          '<div class="ab-cover ab-cover-right"></div>' +
        '</div>' +
        '<div class="ab-controls">' +
          '<button class="ab-btn ab-btn-prev" id="abBtnPrev" onclick="abStep(-1)" disabled>' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>' +
            'Prev' +
          '</button>' +
          '<div class="ab-dots">' + abDotsHTML + '</div>' +
          '<button class="ab-btn ab-btn-next" id="abBtnNext" onclick="abStep(1)">' +
            'Next' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>' +
    '</section>';

  // ── Services page ──
  var servicesPageHTML = (pf.services && pf.services.length) ?
    '<section class="page" id="page-services">' +
      '<div class="pg-header">' +
        '<div class="sec-lbl">What I Offer</div>' +
        '<div class="sec-ttl">Services &amp; Rates</div>' +
      '</div>' +
      '<div class="grid">' + servicesHTML + '</div>' +
      (pf.projects && pf.projects.length ?
        '<div class="pg-header" style="margin-top:60px">' +
          '<div class="sec-lbl">Portfolio</div>' +
          '<div class="sec-ttl">Selected Work</div>' +
        '</div>' +
        '<div class="grid">' + projectsHTML + '</div>' : '') +
      (pf.testimonials && pf.testimonials.length ?
        '<div class="pg-header" style="margin-top:60px">' +
          '<div class="sec-lbl">Social Proof</div>' +
          '<div class="sec-ttl">What Brands Say</div>' +
        '</div>' +
        '<div class="grid">' + testimonialsHTML + '</div>' : '') +
    '</section>' : '';

  // ── Connect page ──
  var connectPageHTML =
    '<section class="page" id="page-connect">' +
      '<div class="pg-header">' +
        '<div class="sec-lbl">Find Me</div>' +
        '<div class="sec-ttl">Follow My Journey</div>' +
      '</div>' +
      (socials.length ? '<div class="social-links">' + socialHTML + '</div>' : '') +
      '<div class="contact-wrap" id="contact">' +
        '<div class="sec-lbl">Let\'s Collaborate</div>' +
        '<div class="contact-ttl">Ready to work together?</div>' +
        '<p class="contact-sub">I partner with brands that align with my audience\'s values. Let\'s create something remarkable.</p>' +
        (pf.email ?
          '<a class="btn btn-p" href="mailto:' + esc(pf.email) + '" style="margin:0 auto;display:inline-flex">Get In Touch →</a>' :
          '') +
      '</div>' +
    '</section>';

  // ── About page (home) ──
  var aboutPageHTML =
    '<section class="page active" id="page-home">' +
      '<div class="hero" id="home">' +
        '<div id="heroBg"></div>' +
        '<div class="hero-ov"></div>' +
        '<div class="hero-c">' +
          '<div class="eyebrow fu">' + esc(pf.niche) + '</div>' +
          '<div class="tagline fu d1">' + esc(pf.ai_tagline || '') + '</div>' +
          '<h1 class="headline fu d2">' + esc(pf.ai_headline || pf.name) + '</h1>' +
          '<div class="hero-btns fu d3">' +
            '<a class="btn btn-p" href="#" onclick="showPage(\'page-connect\');return false;">' + esc(pf.ai_cta || 'Work With Me') + ' →</a>' +
            '<a class="btn btn-s" href="#" onclick="showPage(\'page-services\');return false;">See My Services</a>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="about-body">' +
        statsHTML +
        '<div class="about-bio-wrap">' +
          '<div class="sec-lbl">About</div>' +
          '<div class="sec-ttl">' + esc(pf.name) + '</div>' +
          '<p class="about-bio-text">' + esc(pf.ai_bio || pf.bio || '') + '</p>' +
        '</div>' +
      '</div>' +
    '</section>';

  // ── Nav items ──
  var hasGallery  = true; // Gallery always shown
  var hasServices = pf.services && pf.services.length;

  var navLinks =
    '<a href="#" class="nav-link active" onclick="showPage(\'page-home\');return false;">Home</a>' +
    (hasGallery  ? '<a href="#" class="nav-link" onclick="showPage(\'page-gallery\');return false;">Gallery</a>' : '') +
    (hasServices ? '<a href="#" class="nav-link" onclick="showPage(\'page-services\');return false;">Services</a>' : '') +
    '<a href="#" class="nav-link" onclick="showPage(\'page-connect\');return false;">Connect</a>';

  var mobileNavLinks =
    '<a href="#" class="mnav-link active" onclick="showPage(\'page-home\');closeMnav();return false;">Home</a>' +
    (hasGallery  ? '<a href="#" class="mnav-link" onclick="showPage(\'page-gallery\');closeMnav();return false;">Gallery</a>' : '') +
    (hasServices ? '<a href="#" class="mnav-link" onclick="showPage(\'page-services\');closeMnav();return false;">Services</a>' : '') +
    '<a href="#" class="mnav-link" onclick="showPage(\'page-connect\');closeMnav();return false;">Connect</a>';

  // ── Full page inject ──
  document.open();
  document.write('<!DOCTYPE html><html lang="en"><head>' +
    '<meta charset="UTF-8"/>' +
    '<meta name="viewport" content="width=device-width,initial-scale=1"/>' +
    '<title>' + esc(pf.name) + ' — ' + esc(pf.niche) + ' | ImpactGrid</title>' +
    '<meta name="description" content="' + esc(pf.ai_meta || pf.niche + ' creator portfolio') + '"/>' +
    '<meta property="og:title" content="' + esc(pf.name) + ' — ' + esc(pf.niche) + '"/>' +
    '<meta property="og:description" content="' + esc(pf.ai_bio || pf.bio || '') + '"/>' +
    (heroImg0 ? '<meta property="og:image" content="' + esc(heroImg0) + '"/>' : '') +
    '<meta name="robots" content="index,follow"/>' +
    '<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>' +
    '<style>' +
    '*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}' +
    ':root{--bg:' + t.bg + ';--sf:' + t.surface + ';--tx:' + t.text + ';--sub:' + t.sub + ';--bd:' + t.border + ';--ac:' + accent + ';--fh:\'Syne\',sans-serif;--nav-h:60px}' +
    'html,body{height:100%}' +
    'html{scroll-behavior:smooth}' +
    'body{font-family:\'DM Sans\',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;overflow-x:hidden}' +
    'a{color:inherit;text-decoration:none}' +

    /* NAV */
    '.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;padding:0 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.45);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd)}' +
    '.nav-brand{font-family:var(--fh);font-size:15px;font-weight:800;flex-shrink:0}' +
    '.nav-links{display:flex;gap:6px;align-items:center}' +
    '.nav-link{padding:7px 14px;font-size:13px;color:var(--sub);border-radius:8px;transition:.15s;border:1px solid transparent}' +
    '.nav-link:hover{color:var(--tx);background:rgba(255,255,255,.06)}' +
    '.nav-link.active{color:var(--ac);border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.06)}' +
    '.nav-cta{padding:8px 18px;background:var(--ac);color:#fff;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--fh);transition:.15s;flex-shrink:0}' +
    '.nav-cta:hover{opacity:.85}' +
    '.nav-hamburger{display:none;flex-direction:column;gap:4px;width:22px;cursor:pointer;padding:4px;flex-shrink:0}' +
    '.nav-hamburger span{display:block;height:2px;background:var(--tx);border-radius:2px;transition:.25s}' +

    /* MOBILE NAV DRAWER */
    '.mnav{position:fixed;inset:0;z-index:200;pointer-events:none}' +
    '.mnav-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6);opacity:0;transition:.25s;backdrop-filter:blur(4px)}' +
    '.mnav-drawer{position:absolute;top:0;right:0;bottom:0;width:260px;background:var(--sf);border-left:1px solid var(--bd);padding:24px 20px;display:flex;flex-direction:column;gap:4px;transform:translateX(100%);transition:.25s cubic-bezier(.4,0,.2,1)}' +
    '.mnav-close{align-self:flex-end;font-size:20px;color:var(--sub);cursor:pointer;margin-bottom:12px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--bd)}' +
    '.mnav-link{padding:13px 16px;font-size:15px;font-weight:600;font-family:var(--fh);color:var(--sub);border-radius:10px;border:1px solid transparent;transition:.15s}' +
    '.mnav-link:hover{color:var(--tx);background:rgba(255,255,255,.05)}' +
    '.mnav-link.active{color:var(--ac);background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}' +
    '.mnav-cta{margin-top:12px;padding:13px;background:var(--ac);color:#fff;border-radius:10px;font-family:var(--fh);font-weight:700;text-align:center;font-size:14px}' +
    '.mnav.open .mnav-backdrop{opacity:1;pointer-events:all}' +
    '.mnav.open .mnav-drawer{transform:translateX(0);pointer-events:all}' +

    /* PAGES */
    '.page{display:none;min-height:calc(100vh - var(--nav-h));padding-top:var(--nav-h)}' +
    '.page.active{display:block}' +
    '.pg-header{padding:48px 60px 0;max-width:1100px;margin:0 auto}' +

    /* HERO */
    '.hero{min-height:90vh;position:relative;display:flex;align-items:center;overflow:hidden}' +
    '#heroBg{position:absolute;inset:0;background-size:cover;background-position:center;background-color:var(--sf)}' +
    '.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.45) 0%,rgba(0,0,0,.6) 55%,var(--bg) 100%)}' +
    '.hero-c{position:relative;z-index:2;padding:80px 60px 60px;max-width:800px}' +
    '.eyebrow{font-size:11px;font-family:monospace;letter-spacing:3px;color:var(--ac);text-transform:uppercase;margin-bottom:14px}' +
    '.tagline{font-size:13px;color:var(--sub);margin-bottom:6px;font-family:monospace;letter-spacing:1px}' +
    '.headline{font-family:var(--fh);font-size:clamp(36px,5.5vw,72px);font-weight:800;line-height:1.05;letter-spacing:-2px;margin-bottom:24px}' +
    '.hero-btns{display:flex;gap:12px;flex-wrap:wrap}' +
    '.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:10px;font-family:var(--fh);font-size:13px;font-weight:700;transition:.2s}' +
    '.btn-p{background:var(--ac);color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.3)}' +
    '.btn-p:hover{opacity:.85;transform:translateY(-1px)}' +
    '.btn-s{border:1.5px solid rgba(255,255,255,.2);color:var(--tx)}' +
    '.btn-s:hover{border-color:var(--ac);color:var(--ac)}' +

    /* ABOUT BODY */
    '.about-body{max-width:1100px;margin:0 auto;padding:48px 60px 80px}' +
    '.about-bio-wrap{margin-top:48px}' +
    '.about-bio-text{font-size:16px;color:var(--sub);max-width:660px;line-height:1.85;margin-top:16px}' +

    /* STATS */
    '.stats-row{display:flex;gap:2px;flex-wrap:wrap}' +
    '.stat{flex:1;min-width:110px;padding:18px 22px;background:var(--sf);border:1px solid var(--bd);text-align:center}' +
    '.stat:first-child{border-radius:10px 0 0 10px}.stat:last-child{border-radius:0 10px 10px 0}' +
    '.sv{font-family:var(--fh);font-size:30px;font-weight:800;color:var(--ac);line-height:1}' +
    '.sl2{font-size:9px;letter-spacing:2px;color:var(--sub);margin-top:5px;font-family:monospace}' +

    /* SECTIONS */
    '.sec{padding:72px 60px;max-width:1100px;margin:0 auto}' +
    '.sec-lbl{font-size:10px;font-weight:700;font-family:monospace;letter-spacing:3px;color:var(--ac);text-transform:uppercase;margin-bottom:10px}' +
    '.sec-ttl{font-family:var(--fh);font-size:clamp(26px,3.5vw,44px);font-weight:800;letter-spacing:-1px;margin-bottom:36px;line-height:1.1}' +
    '.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}' +
    '.card{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:22px;transition:.2s}' +
    '.card:hover{border-color:var(--ac);transform:translateY(-2px)}' +
    '.service-icon{font-size:26px;margin-bottom:10px}' +
    '.service-title{font-family:var(--fh);font-size:15px;font-weight:700;margin-bottom:6px}' +
    '.service-desc{font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:10px}' +
    '.service-price{font-family:monospace;font-size:17px;font-weight:700;color:var(--ac)}' +
    '.project-title{font-family:var(--fh);font-size:14px;font-weight:700;margin-bottom:6px}' +
    '.project-desc{font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:10px}' +
    '.project-link{font-size:12px;font-weight:700;color:var(--ac);font-family:monospace}' +
    '.testimonial-quote{font-size:14px;line-height:1.75;color:var(--tx);margin-bottom:14px;font-style:italic}' +
    '.testimonial-author{font-size:11px;color:var(--ac);font-family:monospace;font-weight:700;letter-spacing:.5px}' +

    /* PHOTO ALBUM BOOK GALLERY */
    '.ab-stage{display:flex;flex-direction:column;align-items:center;padding:32px 16px 64px;gap:28px}' +
    '.ab-book-wrap{position:relative;display:flex;align-items:stretch;filter:drop-shadow(0 24px 60px rgba(0,0,0,.55))}' +
    '.ab-cover{width:18px;background:linear-gradient(to bottom,#2a1f14,#3d2c1a,#2a1f14);border-radius:3px;flex-shrink:0}' +
    '.ab-cover-left{border-radius:6px 2px 2px 6px;box-shadow:-3px 0 12px rgba(0,0,0,.4),inset -4px 0 8px rgba(0,0,0,.3)}' +
    '.ab-cover-right{border-radius:2px 6px 6px 2px;box-shadow:3px 0 12px rgba(0,0,0,.4),inset 4px 0 8px rgba(0,0,0,.3)}' +
    '.ab-book{position:relative;width:min(760px,88vw);aspect-ratio:2/1;perspective:2200px;transform-style:preserve-3d}' +
    '.ab-page{position:absolute;inset:0;transform-origin:left center;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.645,.045,.355,1);will-change:transform}' +
    '.ab-page.ab-flipped{transform:rotateY(-180deg)}' +
    '.ab-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;background:var(--sf)}' +
    '.ab-face-front{border-radius:2px 10px 10px 2px}' +
    '.ab-face-back{transform:rotateY(180deg);border-radius:10px 2px 2px 10px}' +
    /* Spread layout — the open book spread with 4 photo grid */
    '.ab-spread{position:relative;width:100%;height:100%;display:flex;flex-direction:column;padding:16px}' +
    '.ab-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;flex:1;border-radius:6px;overflow:hidden}' +
    '.ab-cell{overflow:hidden;border-radius:4px;background:var(--bg)}' +
    '.ab-cell img{width:100%;height:100%;object-fit:cover;display:block;transition:.3s}' +
    '.ab-cell img:hover{transform:scale(1.04)}' +
    '.ab-cell-empty{background:var(--bd)}' +
    /* Spine shadow on each face */
    '.ab-spine{position:absolute;top:0;bottom:0;width:32px;pointer-events:none}' +
    '.ab-spine-front{right:0;background:linear-gradient(to left,rgba(0,0,0,.22),transparent)}' +
    '.ab-spine-back{left:0;background:linear-gradient(to right,rgba(0,0,0,.22),transparent)}' +
    /* Page number */
    '.ab-page-num{font-family:monospace;font-size:10px;letter-spacing:.08em;color:var(--sub);text-align:center;margin-top:8px;flex-shrink:0}' +
    /* End page */
    '.ab-end{align-items:center;justify-content:center;gap:14px;background:var(--sf)}' +
    '.ab-end-icon{font-size:32px;color:var(--ac);opacity:.5}' +
    '.ab-end-text{font-family:var(--fh);font-size:13px;color:var(--sub)}' +
    /* Controls */
    '.ab-controls{display:flex;align-items:center;gap:20px}' +
    '.ab-btn{display:flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx);font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;transition:.2s}' +
    '.ab-btn:hover:not(:disabled){border-color:var(--ac);color:var(--ac)}' +
    '.ab-btn:disabled{opacity:.3;cursor:default}' +
    '.ab-dots{display:flex;gap:7px;align-items:center}' +
    '.ab-dot{width:8px;height:8px;border-radius:50%;border:none;background:var(--bd);cursor:pointer;transition:.2s;padding:0}' +
    '.ab-dot.active{background:var(--ac);transform:scale(1.4)}' +
    '.ab-dot:hover{opacity:.8}' +

    /* SERVICES PAGE */
    '#page-services .pg-header,.#page-connect .pg-header{margin-bottom:0}' +
    '#page-services .grid,#page-services .testimonial-quote{max-width:1100px;margin-left:auto;margin-right:auto}' +
    '.page-inner{max-width:1100px;margin:0 auto;padding:32px 60px 80px}' +

    /* CONNECT / SOCIAL */
    '.social-links{display:flex;flex-direction:column;gap:9px;max-width:560px;margin:24px 60px 0}' +
    '.social-link{display:flex;align-items:center;gap:14px;padding:16px 20px;background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;transition:.2s}' +
    '.social-link:hover{border-color:var(--lc,var(--ac));transform:translateX(4px)}' +
    '.si{width:36px;height:36px;border-radius:9px;background:var(--bd);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}' +
    '.sl-info{display:flex;flex-direction:column;gap:2px;flex:1}' +
    '.sl-label{font-size:14px;font-weight:600;font-family:var(--fh)}' +
    '.sl-sub{font-size:11px;color:var(--sub);font-family:monospace}' +
    '.sa{color:var(--sub);transition:.2s;font-size:18px}' +
    '.social-link:hover .sa{color:var(--lc,var(--ac));transform:translateX(3px)}' +
    '.contact-wrap{background:linear-gradient(135deg,rgba(255,255,255,.025),transparent);border:1.5px solid var(--bd);border-radius:20px;padding:56px;text-align:center;margin:40px 60px 72px}' +
    '.contact-ttl{font-family:var(--fh);font-size:clamp(26px,4vw,46px);font-weight:800;letter-spacing:-1px;margin-bottom:10px}' +
    '.contact-sub{font-size:14px;color:var(--sub);margin-bottom:28px;max-width:460px;margin-left:auto;margin-right:auto}' +

    /* FOOTER */
    'footer{border-top:1px solid var(--bd);padding:28px 60px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}' +
    '.fl{display:flex;gap:18px;font-size:12px;color:var(--sub)}' +
    '.fl a:hover{color:var(--ac)}' +

    /* MODALS */
    '.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}' +
    '.mo.show{display:flex}' +
    '.mb{background:var(--sf);border:1px solid var(--bd);border-radius:16px;max-width:660px;width:100%;max-height:80vh;overflow-y:auto;padding:32px}' +
    '.mb h2{font-family:var(--fh);font-size:20px;font-weight:800;margin-bottom:16px}' +
    '.mb p{font-size:13px;color:var(--sub);line-height:1.8;white-space:pre-line}' +
    '.mc{float:right;width:26px;height:26px;border-radius:7px;background:var(--sf);border:1px solid var(--bd);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--sub)}' +

    /* ANIMATIONS */
    '@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}' +
    '.fu{animation:fadeUp .55s ease both}' +
    '.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}' +

    /* PAGE TRANSITION */
    '@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}' +
    '.page.active{animation:pageIn .3s ease both}' +

    /* RESPONSIVE */
    '@media(max-width:900px){' +
      '.nav-links{display:none}' +
      '.nav-hamburger{display:flex}' +
      '.hero-c{padding:60px 20px 40px}' +
      '.about-body{padding:32px 20px 60px}' +
      '.pg-header{padding:32px 20px 0}' +
      '.page-inner{padding:24px 20px 60px}' +
      '.social-links{margin:24px 20px 0}' +
      '.contact-wrap{margin:32px 20px 56px;padding:36px 24px}' +
      'footer{padding:20px}' +
      '.ab-book{width:94vw}' +
      '.ab-grid{gap:5px}' +
      '.ab-btn{padding:8px 14px;font-size:12px}' +
      '.grid{grid-template-columns:1fr}' +
    '}' +
    '@media(max-width:480px){' +
      '.headline{font-size:32px;letter-spacing:-1px}' +
      '.hero-btns{flex-direction:column;gap:8px}' +
      '.btn{justify-content:center}' +
    '}' +
    '</style></head><body>' +

    /* NAV */
    '<nav class="nav">' +
      '<div class="nav-brand">' + esc(pf.name) + '</div>' +
      '<div class="nav-links">' + navLinks + '</div>' +
      (pf.email ? '<a class="nav-cta" href="mailto:' + esc(pf.email) + '">' + esc(pf.ai_cta || 'Work With Me') + '</a>' : '') +
      '<div class="nav-hamburger" onclick="openMnav()" aria-label="Menu">' +
        '<span></span><span></span><span></span>' +
      '</div>' +
    '</nav>' +

    /* MOBILE NAV */
    '<div class="mnav" id="mnavOverlay">' +
      '<div class="mnav-backdrop" onclick="closeMnav()"></div>' +
      '<div class="mnav-drawer">' +
        '<div class="mnav-close" onclick="closeMnav()">✕</div>' +
        mobileNavLinks +
        (pf.email ? '<a href="mailto:' + esc(pf.email) + '" class="mnav-cta">' + esc(pf.ai_cta || 'Work With Me') + '</a>' : '') +
      '</div>' +
    '</div>' +

    /* PAGES */
    aboutPageHTML +
    (galleryPageHTML || '') +
    (servicesPageHTML || '') +
    connectPageHTML +

    /* FOOTER (inside home page) */
    '<footer>' +
      '<div style="font-family:var(--fh);font-size:14px;font-weight:700">' + esc(pf.name) + '</div>' +
      '<div class="fl">' +
        (pf.ai_terms   ? '<a style="cursor:pointer" onclick="document.getElementById(\'tm\').classList.add(\'show\')">Terms &amp; Conditions</a>' : '') +
        (pf.ai_privacy ? '<a style="cursor:pointer" onclick="document.getElementById(\'pm\').classList.add(\'show\')">Privacy Policy</a>' : '') +
        (pf.email ? '<a href="mailto:' + esc(pf.email) + '">Contact</a>' : '') +
      '</div>' +
      '<div style="font-size:11px;color:var(--sub)">Made with <a href="https://impactgridgroup.com" target="_blank" style="color:var(--ac)">ImpactGrid ✦</a></div>' +
    '</footer>' +

    /* LEGAL MODALS */
    (pf.ai_terms ?
      '<div class="mo" id="tm" onclick="if(event.target===this)this.classList.remove(\'show\')">' +
        '<div class="mb"><button class="mc" onclick="document.getElementById(\'tm\').classList.remove(\'show\')">✕</button><h2>Terms &amp; Conditions</h2><p>' + esc(pf.ai_terms) + '</p></div>' +
      '</div>' : '') +
    (pf.ai_privacy ?
      '<div class="mo" id="pm" onclick="if(event.target===this)this.classList.remove(\'show\')">' +
        '<div class="mb"><button class="mc" onclick="document.getElementById(\'pm\').classList.remove(\'show\')">✕</button><h2>Privacy Policy</h2><p>' + esc(pf.ai_privacy) + '</p></div>' +
      '</div>' : '') +

    /* SCRIPTS */
    '<script>' +
    /* Hero background */
    (heroImg0 ? 'document.getElementById("heroBg").style.backgroundImage="url(' + esc(heroImg0) + ')";' : '') +

    /* Page routing */
    'var _activePage="page-home";' +
    'function showPage(id){' +
      'var old=document.getElementById(_activePage);' +
      'var next=document.getElementById(id);' +
      'if(!next)return;' +
      'if(old){old.classList.remove("active");}' +
      'next.classList.add("active");' +
      '_activePage=id;' +
      'document.querySelectorAll(".nav-link,.mnav-link").forEach(function(a){' +
        'a.classList.toggle("active",a.getAttribute("onclick")&&a.getAttribute("onclick").indexOf(id)>-1);' +
      '});' +
      'window.scrollTo(0,0);' +
    '}' +

    /* Mobile nav */
    'function openMnav(){document.getElementById("mnavOverlay").classList.add("open")}' +
    'function closeMnav(){document.getElementById("mnavOverlay").classList.remove("open")}' +

    /* Photo album book gallery */
    'var _abIdx=0,_abTotal=' + totalSpreads + ',_abBusy=false;' +
    'function abUpdateUI(){' +
      'document.querySelectorAll(".ab-dot").forEach(function(d,j){d.classList.toggle("active",j===_abIdx)});' +
      'var pp=document.getElementById("abBtnPrev");' +
      'var np=document.getElementById("abBtnNext");' +
      'if(pp)pp.disabled=_abIdx===0;' +
      'if(np)np.disabled=_abIdx>=_abTotal-1;' +
    '}' +
    'function abGoto(target){' +
      'if(_abBusy||target===_abIdx)return;' +
      '_abBusy=true;' +
      'var dir=target>_abIdx?1:-1;' +
      'function flipNext(){' +
        'if(target===_abIdx){setTimeout(function(){_abBusy=false;},50);return;}' +
        'if(dir>0){' +
          'var pg=document.getElementById("abPage"+_abIdx);' +
          'if(pg){pg.classList.add("ab-flipped");pg.style.zIndex=_abTotal-_abIdx;}' +
          '_abIdx++;' +
        '}else{' +
          '_abIdx--;' +
          'var pg=document.getElementById("abPage"+_abIdx);' +
          'if(pg){pg.classList.remove("ab-flipped");pg.style.zIndex=(_abTotal*2-_abIdx);}' +
        '}' +
        'abUpdateUI();' +
        'if(target!==_abIdx)setTimeout(flipNext,160);else setTimeout(function(){_abBusy=false;},750);' +
      '}' +
      'flipNext();' +
    '}' +
    'function abStep(d){abGoto(Math.max(0,Math.min(_abIdx+d,_abTotal-1)));}' +
    'abUpdateUI();' +
    /* Arrow key support */
    'document.addEventListener("keydown",function(e){if(_activePage==="page-gallery"){if(e.key==="ArrowLeft")abStep(-1);if(e.key==="ArrowRight")abStep(1);}});' +
    /* Touch/swipe on book */
    'var _abTx=0;var _abBook=document.getElementById("abBook");' +
    'if(_abBook){' +
      '_abBook.addEventListener("touchstart",function(e){_abTx=e.touches[0].clientX;},{passive:true});' +
      '_abBook.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-_abTx;if(Math.abs(dx)>50)abStep(dx<0?1:-1);});' +
    '}' +

    /* Intersection observer for animations */
    'var _obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting)x.target.classList.add("fu")});},{threshold:0.1});' +
    'document.querySelectorAll(".card,.social-link,.stat").forEach(function(el){_obs.observe(el)});' +
    '<\/script>' +
    '</body></html>'
  );
  document.close();
}

loadPortfolio();
</script>
</body>
</html>
