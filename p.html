<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loading portfolio…</title>
<meta name="description" content="ImpactGrid creator portfolio"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
/* ── Loading state ── */
.ig-loading{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#080810;color:rgba(255,255,255,.5);
  font-family:'DM Sans',sans-serif;gap:16px;
}
.ig-loading-spinner{
  width:36px;height:36px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.1);
  border-top-color:#c97e08;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ig-loading-text{font-size:13px;letter-spacing:.05em}

/* ── Error state ── */
.ig-error{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#080810;color:rgba(255,255,255,.7);
  font-family:'DM Sans',sans-serif;gap:12px;text-align:center;
  padding:40px 20px;
}
.ig-error-code{font-size:80px;font-weight:800;font-family:'Syne',sans-serif;
  background:linear-gradient(135deg,#c97e08,#f0b429);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.ig-error h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;
  color:#fff;margin:0}
.ig-error p{font-size:14px;color:rgba(255,255,255,.45);max-width:360px;line-height:1.7}
.ig-error a{
  margin-top:8px;padding:11px 24px;background:#c97e08;color:#fff;
  border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;
  font-weight:700;text-decoration:none;transition:.15s;
}
.ig-error a:hover{opacity:.85}
</style>
</head>
<body>

<!-- Loading screen shown while fetching -->
<div class="ig-loading" id="igLoading">
  <div class="ig-loading-spinner"></div>
  <div class="ig-loading-text">Loading portfolio…</div>
</div>

<script>
// ── Config — content project (read-only anon key, safe in browser) ──
var IG_CONTENT_URL  = 'https://exeiojgldxqaakkybdij.supabase.co';
var IG_CONTENT_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4ZWlvamdsZHhxYWFra3liZGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDc4NTcsImV4cCI6MjA4ODkyMzg1N30.aRXgeHqaOxkidwpWVGEOKBQAeo9_C5Fk3Gu5ZlbmxTQ';

// ── Read slug from URL ──
// Supports both:
//   impactgridgroup.com/p.html?slug=dara338
//   impactgridgroup.com/p/dara338  (if your host supports path rewrites)
function getSlug() {
  // Query param ?slug=xxx
  var params = new URLSearchParams(window.location.search);
  if (params.get('slug')) return params.get('slug');
  // Path segment: /p/dara338 or /p.html — last non-empty segment
  var parts = window.location.pathname.split('/').filter(Boolean);
  var last  = parts[parts.length - 1];
  // If last segment is 'p.html' or 'p', slug is in query — already handled above
  if (last && last !== 'p.html' && last !== 'p') return last;
  return null;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError(code, title, message) {
  document.getElementById('igLoading').outerHTML =
    '<div class="ig-error">' +
      '<div class="ig-error-code">' + code + '</div>' +
      '<h1>' + title + '</h1>' +
      '<p>' + message + '</p>' +
      '<a href="https://impactgridgroup.com">Go to ImpactGrid →</a>' +
    '</div>';
}

async function loadPortfolio() {
  var slug = getSlug();

  if (!slug) {
    showError('404', 'Portfolio not found',
      'No portfolio slug was provided. Check your link and try again.');
    return;
  }

  try {
    var res = await fetch(
      IG_CONTENT_URL + '/rest/v1/portfolios' +
      '?slug=eq.' + encodeURIComponent(slug) +
      '&published=eq.true' +
      '&select=*' +
      '&limit=1',
      {
        headers: {
          'apikey':        IG_CONTENT_ANON,
          'Authorization': 'Bearer ' + IG_CONTENT_ANON
        }
      }
    );

    if (!res.ok) {
      throw new Error('Supabase error: ' + res.status);
    }

    var rows = await res.json();

    if (!rows || !rows.length) {
      showError('404', 'Portfolio not found',
        'This portfolio may have been deleted or is not published yet. ' +
        'Check the link and try again.');
      return;
    }

    renderPortfolio(rows[0]);

  } catch (err) {
    console.error('[ImpactGrid] Failed to load portfolio:', err.message);
    showError('500', 'Something went wrong',
      'We couldn\'t load this portfolio right now. Please try again in a moment.');
  }
}

function renderPortfolio(pf) {
  // ── Theme palettes (mirrors portfolio-studio.js THEMES) ──
  var THEMES = {
    dark:     { bg:'#080810', surface:'#10101e', text:'#e2e8f0', sub:'rgba(226,232,240,0.5)', border:'rgba(255,255,255,0.06)', accent:'#c97e08' },
    navy:     { bg:'#05091a', surface:'#0c1230', text:'#e8eaf6', sub:'rgba(232,234,246,0.5)', border:'rgba(255,255,255,0.07)', accent:'#2d6edb' },
    clean:    { bg:'#f8fafc', surface:'#ffffff', text:'#0d1017', sub:'#4a5068',               border:'rgba(0,0,0,0.07)',        accent:'#2d6edb' },
    midnight: { bg:'#080810', surface:'#10101e', text:'#e2e8f0', sub:'rgba(226,232,240,0.5)', border:'rgba(255,255,255,0.06)', accent:'#818cf8' },
    rose:     { bg:'#1a0d12', surface:'#260d16', text:'#fce7ef', sub:'rgba(252,231,239,0.55)',border:'rgba(255,255,255,0.07)', accent:'#f43f80' },
    forest:   { bg:'#14532d', surface:'#1a6635', text:'#f0fdf4', sub:'rgba(240,253,244,0.6)', border:'rgba(255,255,255,0.08)', accent:'#4ade80' },
  };

  var t      = THEMES[pf.theme] || THEMES.dark;
  var accent = pf.accent_color || t.accent;

  var heroImgs = ((pf.hero_media || []).map(function(m){ return m.url; })).filter(Boolean);
  var heroImg0 = heroImgs[0] || 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1600';
  var initials = (pf.name || 'CR').split(' ').map(function(w){ return w[0]||''; }).join('').toUpperCase().slice(0,2);

  // Update <title> and <meta description>
  document.title = esc(pf.name) + ' — ' + esc(pf.niche) + ' | ImpactGrid';
  var metaDesc = document.querySelector('meta[name="description"]');
  if (metaDesc) metaDesc.content = pf.ai_meta || (pf.niche + ' creator portfolio');

  // ── Social links ──
  var socials = [
    pf.youtube_url   ? { icon:'▶', label:'YouTube',   url:pf.youtube_url,   color:'#ff0000' } : null,
    pf.tiktok_url    ? { icon:'♪', label:'TikTok',    url:pf.tiktok_url,    color:'#69c9d0' } : null,
    pf.instagram_url ? { icon:'◉', label:'Instagram', url:pf.instagram_url, color:'#e1306c' } : null,
    pf.linkedin_url  ? { icon:'in',label:'LinkedIn',  url:pf.linkedin_url,  color:'#0077b5' } : null,
    pf.twitter_url   ? { icon:'𝕏', label:'Twitter/X', url:pf.twitter_url,   color:'#1d9bf0' } : null,
  ].filter(Boolean);

  // ── HTML sections ──
  var servicesHTML = (pf.services || []).map(function(s){
    return '<div class="card service-card">' +
      '<div class="service-icon">' + esc(s.icon||'✦') + '</div>' +
      '<div class="service-title">' + esc(s.title) + '</div>' +
      '<div class="service-desc">'  + esc(s.description) + '</div>' +
      (s.price ? '<div class="service-price">' + esc(s.price) + '</div>' : '') +
    '</div>';
  }).join('');

  var projectsHTML = (pf.projects || []).map(function(p){
    return '<div class="card">' +
      '<div class="project-title">' + esc(p.title) + '</div>' +
      '<div class="project-desc">'  + esc(p.description) + '</div>' +
      (p.url ? '<a href="' + esc(p.url) + '" target="_blank" class="project-link">View project →</a>' : '') +
    '</div>';
  }).join('');

  var testimonialsHTML = (pf.testimonials || []).map(function(t2){
    return '<div class="card">' +
      '<div class="testimonial-quote">"' + esc(t2.quote) + '"</div>' +
      '<div class="testimonial-author">— ' + esc(t2.author) + '</div>' +
    '</div>';
  }).join('');

  var socialHTML = socials.map(function(s){
    return '<a href="' + esc(s.url) + '" target="_blank" class="social-link" style="--lc:' + s.color + '">' +
      '<span class="si">' + s.icon + '</span>' +
      '<span>' + esc(s.label) + '</span>' +
      '<span class="sa">→</span>' +
    '</a>';
  }).join('');

  var statsHTML = (pf.total_followers || pf.engagement_rate || pf.monthly_views) ?
    '<div class="stats-row">' +
      (pf.total_followers ? '<div class="stat"><div class="sv">' + esc(pf.total_followers) + '</div><div class="sl">FOLLOWERS</div></div>' : '') +
      (pf.engagement_rate ? '<div class="stat"><div class="sv">' + esc(pf.engagement_rate) + '</div><div class="sl">ENGAGEMENT</div></div>' : '') +
      (pf.monthly_views   ? '<div class="stat"><div class="sv">' + esc(pf.monthly_views)   + '</div><div class="sl">MONTHLY VIEWS</div></div>' : '') +
    '</div>' : '';

  // Build notebook-style swipeable gallery HTML — shown after hero, always if any images
  var galleryHTML = '';
  if (heroImgs.length > 0) {
    var dots = heroImgs.length > 1 ? heroImgs.map(function(_,i){ return '<button class="ng-dot' + (i===0?' active':'') + '" onclick="ngGoto('+i+')" aria-label="Slide '+(i+1)+'"></button>'; }).join('') : '';
    var slides = heroImgs.map(function(url,i){ return '<div class="ng-slide"><img src="'+url+'" alt="Gallery image '+(i+1)+'" loading="lazy"/></div>'; }).join('');
    var arrows = heroImgs.length > 1 ?
      '<button class="ng-arrow ng-prev" onclick="ngStep(-1)" aria-label="Previous">&#8249;</button>' +
      '<button class="ng-arrow ng-next" onclick="ngStep(1)" aria-label="Next">&#8250;</button>' : '';
    var counter = heroImgs.length > 1 ? '<div class="ng-counter" id="ngCounter">1 / ' + heroImgs.length + '</div>' : '';
    galleryHTML = '<div class="gallery-section"><div class="notebook-gallery" id="notebookGallery">' +
      '<div class="ng-track" id="ngTrack">' + slides + '</div>' +
      arrows +
      (heroImgs.length > 1 ? '<div class="ng-dots">' + dots + '</div>' : '') +
      counter +
    '</div></div>';
  }

  var galleryScript = heroImgs.length > 1 ? (
    'var _ngIdx=0,_ngTotal=' + heroImgs.length + ';' +
    'var _ngTrack=document.getElementById("ngTrack");' +
    'var _ngDots=document.querySelectorAll(".ng-dot");' +
    'function ngGoto(i){_ngIdx=Math.max(0,Math.min(i,_ngTotal-1));_ngTrack.style.transform="translateX(-"+(_ngIdx*100)+"%)";_ngDots.forEach(function(d,j){d.classList.toggle("active",j===_ngIdx)});document.getElementById("ngCounter").textContent=(_ngIdx+1)+" / "+_ngTotal;}' +
    'function ngStep(d){ngGoto(_ngIdx+d);}' +
    // Touch/swipe support
    'var _ngTx=0;' +
    '_ngTrack.addEventListener("touchstart",function(e){_ngTx=e.touches[0].clientX;},{passive:true});' +
    '_ngTrack.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-_ngTx;if(Math.abs(dx)>40)ngStep(dx<0?1:-1);});' +
    // Keyboard support
    'document.addEventListener("keydown",function(e){if(e.key==="ArrowLeft")ngStep(-1);if(e.key==="ArrowRight")ngStep(1);});'
  ) : '';

  var slideshowScript = galleryScript;

  // ── Inject full page ──
  document.open();
  document.write('<!DOCTYPE html><html lang="en"><head>' +
    '<meta charset="UTF-8"/>' +
    '<meta name="viewport" content="width=device-width,initial-scale=1"/>' +
    '<title>' + esc(pf.name) + ' — ' + esc(pf.niche) + ' | ImpactGrid</title>' +
    '<meta name="description" content="' + esc(pf.ai_meta || pf.niche + ' creator portfolio') + '"/>' +
    '<meta property="og:title" content="' + esc(pf.name) + ' — ' + esc(pf.niche) + '"/>' +
    '<meta property="og:description" content="' + esc(pf.ai_bio || pf.bio || '') + '"/>' +
    (heroImg0 ? '<meta property="og:image" content="' + esc(heroImg0) + '"/>' : '') +
    '<meta name="robots" content="index,follow"/>' +
    '<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>' +
    '<style>' +
    '*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}' +
    ':root{--bg:' + t.bg + ';--sf:' + t.surface + ';--tx:' + t.text + ';--sub:' + t.sub + ';--bd:' + t.border + ';--ac:' + accent + ';--fh:\'Syne\',sans-serif}' +
    'html{scroll-behavior:smooth}' +
    'body{font-family:\'DM Sans\',sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}' +
    'a{color:inherit;text-decoration:none}' +
    '.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.4);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd)}' +

    '.nav-links{display:flex;gap:22px;font-size:13px;color:var(--sub)}' +
