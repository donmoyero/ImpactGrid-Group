<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ImpactGrid Creator Studio</title>

<link rel="stylesheet" href="upload.css">

<style>

body{
background:#080808;
color:#f0ebe5;
font-family:DM Sans,Arial;
margin:0;
}

.topbar{
height:56px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
border-bottom:1px solid #222;
background:#0f0f0f;
}

.main{
display:grid;
grid-template-columns:1fr 320px;
gap:20px;
padding:20px;
}

.card{
background:#141414;
border:1px solid #222;
border-radius:10px;
padding:16px;
}

.btn{
background:#ff5c1a;
color:#fff;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.btn:hover{
background:#c94010;
}

.clip-zone{
border:2px dashed #333;
border-radius:10px;
padding:30px;
text-align:center;
cursor:pointer;
}

.clip-zone:hover{
border-color:#ff5c1a;
}

.preview{
position:relative;
background:#000;
border-radius:10px;
overflow:hidden;
aspect-ratio:9/16;
}

.preview video{
width:100%;
height:100%;
object-fit:cover;
}

.caption-preview{
position:absolute;
bottom:12%;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.75);
padding:6px 10px;
border-radius:6px;
font-weight:bold;
}

.broll-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-top:10px;
}

.broll-grid img{
width:100%;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">
<div style="font-weight:700">ImpactGrid Creator Studio</div>
<div>
<button class="btn" onclick="startRender()">Export Video</button>
</div>
</div>

<div class="main">

<div>

<div class="card">

<h3>Upload Clips</h3>

<label class="clip-zone">

<input type="file" id="clipInput" accept="video/*" multiple style="display:none">

<div>
🎬 Drop clips here or click
</div>

</label>

<div id="clipList"></div>

</div>


<div class="card" style="margin-top:16px">

<h3>AI Editing</h3>

<button class="btn" onclick="autoEdit()">Auto Edit Story</button>

<p style="font-size:12px;color:#777;margin-top:6px">
Speech detection → captions → visuals → render
</p>

</div>

</div>


<div>

<div class="card">

<h3>Preview</h3>

<div class="preview">

<video id="prevVideo" muted playsinline></video>

<div class="caption-preview" id="captionPreview">
Caption preview
</div>

</div>

<div style="margin-top:10px">

<button class="btn" onclick="playPreview()">Play</button>

<button class="btn" onclick="pausePreview()">Pause</button>

</div>

</div>


<div class="card" style="margin-top:16px">

<h3>AI B-Roll Images</h3>

<div id="brollGrid" class="broll-grid"></div>

</div>

</div>

</div>


<script src="upload.js"></script>

</body>
</html>
