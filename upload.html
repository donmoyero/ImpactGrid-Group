<script>

document.addEventListener("DOMContentLoaded", function(){

function resize(){
  var g=document.getElementById('twoCol');
  if(g) g.style.gridTemplateColumns=window.innerWidth<740?'1fr':'1fr 285px';
}

resize();
window.addEventListener('resize',resize);

const fileInput = document.getElementById('vfile');

if(!fileInput) return;

fileInput.addEventListener('change',function(){

  if(!this.files.length) return;

  startProcessing();

});

const steps=[
{l:'Receive video',d:'Uploading your file…'},
{l:'Analyse content',d:'AI scanning your footage…'},
{l:'Edit & trim',d:'Creating platform cuts…'},
{l:'Generate captions',d:'Auto-captioning formats…'},
{l:'Write copy',d:'Generating posts…'},
{l:'Update calendar',d:'Scheduling content…'}
];

function renderSteps(cur){

document.getElementById('stepList').innerHTML = steps.map(function(s,i){

return `
<div style="display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--b)">
<div style="width:30px;height:30px;border-radius:50%;background:${i<=cur?'rgba(31,217,122,.15)':'var(--b)'};display:flex;align-items:center;justify-content:center;font-size:.82rem">
${i<cur?'✔':i+1}
</div>
<div>
<div style="font-size:.8rem;font-weight:600">${s.l}</div>
<div style="font-size:.67rem;color:var(--dim)">${i<=cur?s.d:'Waiting…'}</div>
</div>
</div>
`;

}).join("");

}

window.startProcessing=function(){

document.getElementById('stIdle').style.display='none';
document.getElementById('stProc').style.display='block';

let cur=0;
renderSteps(cur);

const t=setInterval(()=>{

cur++;

const pct=Math.round(cur/steps.length*100);

document.getElementById('pbar').style.width=pct+'%';
document.getElementById('pct').textContent=pct+'%';

renderSteps(cur);

if(cur>=steps.length){

clearInterval(t);

setTimeout(()=>{
document.getElementById('stProc').style.display='none';
document.getElementById('stDone').style.display='block';
},600);

}

},900);

};

window.resetUp=function(){

document.getElementById('stDone').style.display='none';
document.getElementById('stIdle').style.display='block';
document.getElementById('pbar').style.width='0';

fileInput.value='';

};

});

</script>
