<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — ImpactGrid</title>
<link rel="icon" href="favicon.ico"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.dash-layout { display:grid; grid-template-columns:240px 1fr; min-height:100vh; padding-top:var(--nav-h); }
.dash-sidebar { background:var(--ink2); border-right:1px solid var(--border); padding:28px 16px; position:sticky; top:var(--nav-h); height:calc(100vh - var(--nav-h)); overflow-y:auto; display:flex; flex-direction:column; }
.sidebar-nav-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.1em; font-weight:700; padding:0 8px; margin-bottom:8px; margin-top:16px; }
.sidebar-nav a { display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:var(--r); font-size:14px; font-weight:500; color:var(--text2); transition:all 0.2s; margin-bottom:2px; }
.sidebar-nav a:hover { background:var(--card); color:var(--text); }
.sidebar-nav a.active { background:rgba(239,68,68,0.1); color:#fca5a5; border:1px solid rgba(239,68,68,0.2); }
.nav-icon { font-size:16px; width:20px; text-align:center; }
.sidebar-spacer { flex:1; }
.sidebar-logout { display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:var(--r); font-size:14px; font-weight:500; color:var(--text3); cursor:pointer; transition:all 0.2s; border:none; background:none; width:100%; }
.sidebar-logout:hover { background:var(--red-dim); color:var(--red); }
.dash-main { padding:40px; }
.admin-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); border-radius:100px; font-size:11px; font-weight:700; color:#fca5a5; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:24px; }
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:20px; }
.stat-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
.stat-value { font-size:28px; font-weight:900; letter-spacing:-0.03em; color:var(--text); }
.dash-section { background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:28px; margin-bottom:24px; display:none; }
.dash-section.active { display:block; }
.section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.section-head h2 { font-size:18px; font-weight:800; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; padding:10px 12px; border-bottom:1px solid var(--border); }
td { padding:14px 12px; border-bottom:1px solid var(--border); font-size:14px; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(255,255,255,0.02); }
.act-btn { padding:6px 14px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; border:none; transition:all 0.2s; }
.approve-btn { background:var(--green-dim); color:var(--green); border:1px solid rgba(34,197,94,0.2); }
.approve-btn:hover { background:var(--green); color:#000; }
.reject-btn { background:var(--red-dim); color:var(--red); border:1px solid rgba(239,68,68,0.2); margin-left:6px; }
.reject-btn:hover { background:var(--red); color:#fff; }
.del-btn { background:var(--red-dim); color:var(--red); border:1px solid rgba(239,68,68,0.2); }
.del-btn:hover { background:var(--red); color:#fff; }
.empty-state { text-align:center; padding:40px; color:var(--text3); font-size:14px; }
@media (max-width:900px) {
  .dash-layout { grid-template-columns:1fr; }
  .dash-sidebar { display:none; }
  .dash-main { padding:24px 20px; }
  .stats-row { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>
<div id="nav-container"></div>
<div class="dash-layout">
  <aside class="dash-sidebar">
    <div style="padding:12px;font-size:13px;font-weight:800;color:#fca5a5;text-align:center;margin-bottom:8px;">⚙ ADMIN PANEL</div>
    <nav class="sidebar-nav">
      <a href="#" class="active" onclick="showSection('overview',this)"><span class="nav-icon">◈</span> Overview</a>
      <a href="#" onclick="showSection('pending',this)"><span class="nav-icon">⏳</span> Pending Approval</a>
      <a href="#" onclick="showSection('professionals',this)"><span class="nav-icon">👤</span> Professionals</a>
      <a href="#" onclick="showSection('employers',this)"><span class="nav-icon">🏢</span> Employers</a>
      <a href="#" onclick="showSection('jobs',this)"><span class="nav-icon">📋</span> Jobs</a>
    </nav>
    <div class="sidebar-spacer"></div>
    <a href="index.html" style="display:flex;align-items:center;gap:10px;padding:11px 12px;font-size:13px;color:var(--text3);border-radius:var(--r);margin-bottom:4px;">← Back to Site</a>
    <button class="sidebar-logout" onclick="igLogout()"><span>⎋</span> Sign Out</button>
  </aside>

  <main class="dash-main">
    <div class="admin-badge">🔒 Admin Access</div>

    <!-- Overview -->
    <div class="dash-section active" id="section-overview">
      <h1 style="font-size:26px;margin-bottom:24px;">Admin Overview</h1>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Pending</div>
          <div class="stat-value" id="stat-pending">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Professionals</div>
          <div class="stat-value" id="stat-pros">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Employers</div>
          <div class="stat-value" id="stat-emps">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Jobs</div>
          <div class="stat-value" id="stat-jobs">—</div>
        </div>
      </div>
    </div>

    <!-- Pending -->
    <div class="dash-section" id="section-pending">
      <div class="section-head"><h2>Pending Approval</h2><button class="btn btn-ghost" style="font-size:13px;padding:8px 14px;" onclick="loadPending()">↻ Refresh</button></div>
      <div id="pendingList"><div class="empty-state">Loading…</div></div>
    </div>

    <!-- Professionals -->
    <div class="dash-section" id="section-professionals">
      <div class="section-head"><h2>All Professionals</h2><button class="btn btn-ghost" style="font-size:13px;padding:8px 14px;" onclick="loadProfessionals()">↻ Refresh</button></div>
      <div id="prosList"><div class="empty-state">Loading…</div></div>
    </div>

    <!-- Employers -->
    <div class="dash-section" id="section-employers">
      <div class="section-head"><h2>All Employers</h2><button class="btn btn-ghost" style="font-size:13px;padding:8px 14px;" onclick="loadEmployers()">↻ Refresh</button></div>
      <div id="empsList"><div class="empty-state">Loading…</div></div>
    </div>

    <!-- Jobs -->
    <div class="dash-section" id="section-jobs">
      <div class="section-head"><h2>All Jobs</h2><button class="btn btn-ghost" style="font-size:13px;padding:8px 14px;" onclick="loadJobs()">↻ Refresh</button></div>
      <div id="jobsList"><div class="empty-state">Loading…</div></div>
    </div>

  </main>
</div>

<script src="nav.js"></script>
<script src="supabase-config.js"></script>
<script>
renderNav('');

/* Admin email — change to yours */
var ADMIN_EMAIL = 'admin@impactgridgroup.com';

document.addEventListener('DOMContentLoaded', async function() {
  var client = getSupabase();
  var { data } = await client.auth.getSession();
  if (!data.session) { window.location.href = 'login.html'; return; }
  if (data.session.user.email !== ADMIN_EMAIL && data.session.user.user_metadata?.role !== 'admin') {
    window.location.href = 'dashboard.html'; return;
  }
  loadStats();
  loadPending();
});

function showSection(id, el) {
  document.querySelectorAll('.dash-section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.sidebar-nav a').forEach(function(a) { a.classList.remove('active'); });
  document.getElementById('section-' + id).classList.add('active');
  if (el) el.classList.add('active');
  if (id === 'professionals') loadProfessionals();
  if (id === 'employers') loadEmployers();
  if (id === 'jobs') loadJobs();
  return false;
}

async function loadStats() {
  try {
    var client = getSupabase();
    var { data: pending } = await client.from('profiles').select('id').eq('status','pending');
    var { data: pros }    = await client.from('profiles').select('id').eq('role','professional').eq('status','active');
    var { data: emps }    = await client.from('profiles').select('id').eq('role','employer');
    var { data: jobs }    = await client.from('jobs').select('id').eq('status','active');
    document.getElementById('stat-pending').textContent = (pending||[]).length;
    document.getElementById('stat-pros').textContent    = (pros||[]).length;
    document.getElementById('stat-emps').textContent    = (emps||[]).length;
    document.getElementById('stat-jobs').textContent    = (jobs||[]).length;
  } catch(e) {}
}

async function loadPending() {
  try {
    var client = getSupabase();
    var { data } = await client.from('profiles').select('*').eq('status','pending').eq('role','professional').order('created_at', {ascending:false});
    if (!data || !data.length) {
      document.getElementById('pendingList').innerHTML = '<div class="empty-state">No pending applications. ✅</div>'; return;
    }
    var html = '<table><thead><tr><th>Name</th><th>Email</th><th>Skills</th><th>Joined</th><th>Actions</th></tr></thead><tbody>' +
      data.map(function(p) {
        return '<tr>' +
          '<td style="font-weight:600;">' + (p.full_name||'—') + '</td>' +
          '<td style="color:var(--text2);">' + (p.email||'—') + '</td>' +
          '<td style="color:var(--text2);">' + (p.skills||'—') + '</td>' +
          '<td style="color:var(--text3);">' + new Date(p.created_at).toLocaleDateString('en-GB') + '</td>' +
          '<td>' +
            '<button class="act-btn approve-btn" onclick="approveUser(\'' + p.id + '\')">Approve</button>' +
            '<button class="act-btn reject-btn" onclick="rejectUser(\'' + p.id + '\')">Reject</button>' +
          '</td></tr>';
      }).join('') +
    '</tbody></table>';
    document.getElementById('pendingList').innerHTML = html;
  } catch(e) { document.getElementById('pendingList').innerHTML = '<div class="empty-state">Error loading data: ' + e.message + '</div>'; }
}

async function approveUser(id) {
  if (!confirm('Approve this professional?')) return;
  var client = getSupabase();
  await client.from('profiles').update({ status:'active' }).eq('id', id);
  loadPending(); loadStats();
}

async function rejectUser(id) {
  if (!confirm('Reject and delete this application?')) return;
  var client = getSupabase();
  await client.from('profiles').update({ status:'rejected' }).eq('id', id);
  loadPending(); loadStats();
}

async function loadProfessionals() {
  try {
    var client = getSupabase();
    var { data } = await client.from('profiles').select('*').eq('role','professional').order('created_at',{ascending:false});
    if (!data || !data.length) { document.getElementById('prosList').innerHTML = '<div class="empty-state">No professionals yet.</div>'; return; }
    var html = '<table><thead><tr><th>Name</th><th>Email</th><th>Skills</th><th>Status</th><th>Actions</th></tr></thead><tbody>' +
      data.map(function(p) {
        var statusColors = { active:'color:var(--green)', pending:'color:#eab308', rejected:'color:var(--red)' };
        return '<tr>' +
          '<td style="font-weight:600;">' + (p.full_name||'—') + '</td>' +
          '<td style="color:var(--text2);">' + (p.email||'—') + '</td>' +
          '<td style="color:var(--text2);">' + ((p.skills||'').substring(0,40)||'—') + '</td>' +
          '<td style="' + (statusColors[p.status]||'') + ';font-weight:600;">' + (p.status||'—') + '</td>' +
          '<td><button class="act-btn del-btn" onclick="deleteProfile(\'' + p.id + '\')">Remove</button></td>' +
        '</tr>';
      }).join('') + '</tbody></table>';
    document.getElementById('prosList').innerHTML = html;
  } catch(e) {}
}

async function loadEmployers() {
  try {
    var client = getSupabase();
    var { data } = await client.from('profiles').select('*').eq('role','employer').order('created_at',{ascending:false});
    if (!data || !data.length) { document.getElementById('empsList').innerHTML = '<div class="empty-state">No employers yet.</div>'; return; }
    var html = '<table><thead><tr><th>Name</th><th>Company</th><th>Email</th><th>Industry</th><th>Joined</th></tr></thead><tbody>' +
      data.map(function(p) {
        return '<tr>' +
          '<td style="font-weight:600;">' + (p.full_name||'—') + '</td>' +
          '<td>' + (p.company_name||'—') + '</td>' +
          '<td style="color:var(--text2);">' + (p.email||'—') + '</td>' +
          '<td style="color:var(--text2);">' + (p.industry||'—') + '</td>' +
          '<td style="color:var(--text3);">' + new Date(p.created_at).toLocaleDateString('en-GB') + '</td>' +
        '</tr>';
      }).join('') + '</tbody></table>';
    document.getElementById('empsList').innerHTML = html;
  } catch(e) {}
}

async function loadJobs() {
  try {
    var client = getSupabase();
    var { data } = await client.from('jobs').select('*').order('created_at',{ascending:false});
    if (!data || !data.length) { document.getElementById('jobsList').innerHTML = '<div class="empty-state">No jobs posted yet.</div>'; return; }
    var html = '<table><thead><tr><th>Title</th><th>Company</th><th>Budget</th><th>Status</th><th>Posted</th><th>Actions</th></tr></thead><tbody>' +
      data.map(function(j) {
        return '<tr>' +
          '<td style="font-weight:600;">' + (j.title||'—') + '</td>' +
          '<td>' + (j.company_name||'—') + '</td>' +
          '<td style="color:var(--text2);">' + (j.budget||'—') + '</td>' +
          '<td><span class="chip" style="font-size:11px;">' + (j.status||'active') + '</span></td>' +
          '<td style="color:var(--text3);">' + new Date(j.created_at).toLocaleDateString('en-GB') + '</td>' +
          '<td><button class="act-btn del-btn" onclick="removeJob(\'' + j.id + '\')">Remove</button></td>' +
        '</tr>';
      }).join('') + '</tbody></table>';
    document.getElementById('jobsList').innerHTML = html;
  } catch(e) {}
}

async function deleteProfile(id) {
  if (!confirm('Remove this profile from the network?')) return;
  var client = getSupabase();
  await client.from('profiles').delete().eq('id', id);
  loadProfessionals(); loadStats();
}

async function removeJob(id) {
  if (!confirm('Remove this job post?')) return;
  var client = getSupabase();
  await client.from('jobs').update({ status:'removed' }).eq('id', id);
  loadJobs(); loadStats();
}
</script>
</body>
</html>
